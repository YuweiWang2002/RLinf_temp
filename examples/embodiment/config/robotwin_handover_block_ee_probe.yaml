# Probe-only config for inspecting RoboTwin handover_block action_type=ee.
# This file is not a training config and intentionally omits actor/rollout setup.

env:
  group_name: "EnvGroup"
  enable_offload: false

  train:
    env_type: robotwin
    total_num_envs: 1
    auto_reset: false
    ignore_terminations: false
    reward_coef: 1.0
    use_custom_reward: true
    use_rel_reward: true
    center_crop: false
    seed: 0
    group_size: 1
    use_fixed_reset_state_ids: false
    max_steps_per_rollout_epoch: 200
    max_episode_steps: 200
    is_eval: false
    assets_path: ${oc.env:ROBOTWIN_PATH}
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/train_seeds.json
    video_cfg:
      save_video: false
      info_on_video: false
      video_base_dir: outputs/handover_residual_demo/probe_video/train
    enable_offload: false
    task_config:
      task_name: handover_block
      action_type: ee
      step_lim: 200
      planner_backend: mplib
      render_freq: 0
      episode_num: 1
      use_seed: false
      save_freq: 0
      embodiment: [aloha-agilex]
      language_num: 1
      domain_randomization:
        random_background: false
        cluttered_table: false
        clean_background_rate: 1
        random_head_camera_dis: 0
        random_table_height: 0
        random_light: false
        crazy_random_light_rate: 0
      camera:
        head_camera_type: D435
        wrist_camera_type: D435
        collect_head_camera: true
        collect_wrist_camera: true
      data_type:
        rgb: true
        third_view: false
        depth: false
        pointcloud: false
        observer: false
        endpose: true
        qpos: true
        mesh_segmentation: false
        actor_segmentation: false
      pcd_down_sample_num: 1024
      pcd_crop: true
      save_path: ./data
      clear_cache_freq: 1
      collect_data: false
      eval_video_log: false

  eval:
    env_type: robotwin
    total_num_envs: 1
    auto_reset: false
    ignore_terminations: false
    reward_coef: 1.0
    use_custom_reward: true
    use_rel_reward: true
    center_crop: false
    seed: 0
    group_size: 1
    use_fixed_reset_state_ids: true
    max_steps_per_rollout_epoch: 200
    max_episode_steps: 200
    is_eval: true
    assets_path: ${oc.env:ROBOTWIN_PATH}
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/eval_seeds.json
    video_cfg:
      save_video: false
      info_on_video: false
      video_base_dir: outputs/handover_residual_demo/probe_video/eval
    enable_offload: false
    task_config:
      task_name: handover_block
      action_type: ee
      step_lim: 200
      planner_backend: mplib
      render_freq: 0
      episode_num: 1
      use_seed: false
      save_freq: 0
      embodiment: [aloha-agilex]
      language_num: 1
      domain_randomization:
        random_background: false
        cluttered_table: false
        clean_background_rate: 1
        random_head_camera_dis: 0
        random_table_height: 0
        random_light: false
        crazy_random_light_rate: 0
      camera:
        head_camera_type: D435
        wrist_camera_type: D435
        collect_head_camera: true
        collect_wrist_camera: true
      data_type:
        rgb: true
        third_view: false
        depth: false
        pointcloud: false
        observer: false
        endpose: true
        qpos: true
        mesh_segmentation: false
        actor_segmentation: false
      pcd_down_sample_num: 1024
      pcd_crop: true
      save_path: ./data
      clear_cache_freq: 1
      collect_data: false
      eval_video_log: false

probe:
  description: "Runtime-only EE action interface probe; not for training."
  expected_task: handover_block
  expected_action_type: ee
