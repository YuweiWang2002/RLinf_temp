defaults:
  - env/realworld_agilex@env.train
  - env/realworld_agilex@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor:
      node_group: gpu
      placement: 0
    env:
      node_group: agilex
      placement: 0
    rollout:
      node_group: gpu
      placement: 0
  node_groups:
    - label: gpu
      node_ranks: 0
    - label: agilex
      node_ranks: 0
      hardware:
        type: Agilex
        configs:
          - node_rank: 0
            # Policy side connects to robot-side bridge server at this endpoint.
            robot_host: "192.168.31.125"
            robot_port: 10001

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "realworld_agilexdesk_dagger_openpi"
    logger_backends: ["tensorboard"]

  max_epochs: 8000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

algorithm:
  dagger:
    init_beta: 1.0
    beta_schedule: "exponential"
    beta_decay: 0.99
    only_save_expert: True

  rollout_epoch: 1
  eval_rollout_epoch: 1
  gamma: 0.99

  update_epoch: 1
  adv_type: gae
  loss_type: embodied_dagger

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: 14
    max_length: 1024
    min_length: 1

  replay_buffer:
    enable_cache: True
    cache_size: 200
    min_buffer_size: 4
    sample_window_size: 200
    auto_save: False

env:
  group_name: "EnvGroup"

  train:
    auto_reset: True
    ignore_terminations: False
    total_num_envs: 1
    use_spacemouse: False
    no_gripper: False
    init_params:
      id: "AgilexTideupdeskEnv-v1"
    max_steps_per_rollout_epoch: 1000
    max_episode_steps: 1000
    override_cfg:
      use_dense_reward: False

  eval:
    total_num_envs: 1
    auto_reset: True
    ignore_terminations: False
    use_spacemouse: False
    no_gripper: False
    init_params:
      id: "AgilexTideupdeskEnv-v1"
    max_steps_per_rollout_epoch: 10
    max_episode_steps: 10
    override_cfg:
      use_dense_reward: False

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  collect_prev_infos: False

  model:
    model_path: "/data4/nfs_data/checkpoints/pi05_agilex_realworld"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 8
  global_batch_size: 8
  seed: 0
  enable_offload: False

  model:
    precision: null
    model_path: "/data4/nfs_data/checkpoints/pi05_agilex_realworld"
    num_action_chunks: 10
    action_dim: 14
    add_value_head: False
    openpi:
      config_name: "pi05_agilex_realworld"
      num_images_in_input: 3
      train_expert_only: False
      detach_critic_input: True
      action_chunk: ${actor.model.num_action_chunks}

  optim:
    lr: 1.0e-5
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1.0e-10
    clip_grad: 4.0
    warmup_style: "cosine"
    lr_warmup_steps: 20
    total_training_steps: 1000

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
